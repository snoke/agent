services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: challenge_frontend
    working_dir: /var/www/html
    volumes:
      - ./frontend:/var/www/html
      - /var/www/html/node_modules
    ports:
      - "8080:5173"
    environment:
      - VITE_N8N_BASE_URL=${VITE_N8N_BASE_URL:-http://localhost:5678}
      - VITE_AGENT_WEBHOOK_URL=${VITE_AGENT_WEBHOOK_URL:-http://localhost:5678/webhook/agent-chat-confirm}
      - VITE_AGENT_VOICE_WEBHOOK_URL=${VITE_AGENT_VOICE_WEBHOOK_URL:-http://localhost:5678/webhook/agent-chat-confirm-voice}
    depends_on:
      - n8n
    restart: unless-stopped
    networks:
      - internal

  n8n:
    image: n8nio/n8n:latest
    container_name: challenge_n8n
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - internal

volumes:
  n8n_data:

networks:
  internal:
    driver: bridge
